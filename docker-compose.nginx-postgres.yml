services:
  php:
    build: ./php
    volumes:
      - ./php/app:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./php/app:/var/www/html
      - ./nginx/yii.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
    - app-network

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
    - app-network

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - app-network

volumes:
  postgres_data:

networks:
   app-network:



